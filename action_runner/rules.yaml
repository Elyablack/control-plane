rules:
  - name: backup_missing_chain
    enabled: true
    match:
      alertname: BackupMissing
      status: firing
      severity: critical
    action:
      type: chain
      steps:
        - name: run_backup
          payload: {}
        - name: verify_backup
          payload: {}
        - name: notify_tg
          payload:
            message: "Backup workflow finished on VPS"
            source: "action-runner"
            event: "backup_chain_completed"
    cooldown_seconds: 3600

  - name: host_reboot_detected_ignore
    enabled: true
    match:
      alertname: HostRebootDetected
      status: firing
    action:
      type: ignore
    cooldown_seconds: 0
