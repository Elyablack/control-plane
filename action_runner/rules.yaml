rules:
  - name: backup_missing_chain
    enabled: true
    match:
      alertname: BackupMissing
      status: firing
      severity: critical
    action:
      type: chain
      steps:
        - name: run_backup
          payload: {}
        - name: verify_backup
          payload: {}
        - name: notify_tg
          payload:
            message: "[{{ chain_status|upper }}] {{ alertname }} on {{ instance }}"
            description: |
              Backup workflow finished

              rule: {{ rule_name }}
              backup_run_id: {{ first_run_id }}
              steps_executed: {{ step_count }}/{{ total_steps }}
            source: "action-runner"
            event: "backup_chain_completed"
            severity: "info"
            status: "firing"
          retries: 3
          retry_delay_seconds: 2
    cooldown_seconds: 3600

  - name: mac_memory_pressure_warning_notify
    enabled: true
    match:
      alertname: MacMemoryPressure
      status: firing
      severity: warning
    action:
      type: chain
      steps:
        - name: notify_tg
          payload:
            format: message
            title: "[MAC][WARNING] {{ instance }} memory pressure"
            facts:
              - key: top_app
                value: "{{ top_app }}"
              - key: top_rss_mb
                value: "{{ top_rss_mb }}"
              - key: swap_used_mb
                value: "{{ swap_used_mb }}"
              - key: memory_free_percent
                value: "{{ memory_free_percent }}"
              - key: uptime_days
                value: "{{ uptime_days }}"
              - key: suggested_action
                value: "{{ suggested_action }}"
            body: "{{ reason_text }}"
            source: "action-runner"
            event: "mac_memory_pressure_warning"
            severity: "warning"
            status: "firing"
          retries: 3
          retry_delay_seconds: 2
    cooldown_seconds: 900

  - name: mac_memory_pressure_critical_escalate
    enabled: true
    match:
      alertname: MacMemoryPressure
      status: firing
      severity: critical
    action:
      type: chain
      steps:
        - name: notify_tg
          payload:
            format: message
            title: "[MAC][CRITICAL] {{ instance }} memory pressure"
            facts:
              - key: top_app
                value: "{{ top_app }}"
              - key: top_rss_mb
                value: "{{ top_rss_mb }}"
              - key: swap_used_mb
                value: "{{ swap_used_mb }}"
              - key: memory_free_percent
                value: "{{ memory_free_percent }}"
              - key: uptime_days
                value: "{{ uptime_days }}"
              - key: suggested_action
                value: "{{ suggested_action }}"
              - key: remediation
                value: "soft_quit_allowlisted_candidate"
            body: "{{ reason_text }}"
            source: "action-runner"
            event: "mac_memory_pressure_critical"
            severity: "critical"
            status: "firing"

        - name: enqueue_mac_action
          payload:
            action: "soft_quit_allowlisted_candidate"
            instance: "{{ instance }}"
            severity: "{{ severity }}"
    cooldown_seconds: 300

  - name: host_reboot_detected_ignore
    enabled: true
    match:
      alertname: HostRebootDetected
      status: firing
    action:
      type: ignore
    cooldown_seconds: 0

  - name: admin_host_audit_weekly
    enabled: true
    match:
      alertname: AdminHostAuditWeekly
      status: firing
    action:
      type: chain
      steps:
        - name: run_admin_host_audit
          payload:
            host: admin
            timeout_seconds: 120

        - name: verify_admin_host_audit
          payload:
            host: admin
            log_dir: /var/log/admin-host-audit
            max_age_seconds: 1800
            timeout_seconds: 30

        - name: analyze_admin_host_audit
          payload:
            host: admin
            log_dir: /var/log/admin-host-audit
            timeout_seconds: 30

        - name: notify_tg
          when:
            analysis_level_in: ["warning", "critical"]
          payload:
            format: message
            message: "[ADMIN][{{ analysis_level|upper }}] unattended audit findings on {{ instance }}"
            description: |
              findings: {{ analysis_findings_count }}
              {{ analysis_summary }}

              log: {{ analysis_log_path }}
            source: "action-runner"
            event: "admin_host_audit_findings"
            severity: "{{ analysis_level }}"
            status: "firing"
    cooldown_seconds: 3600

  - name: weekly_ops_review_generate
    enabled: true
    match:
      alertname: WeeklyOpsReview
      status: firing
      severity: info
    action:
      type: chain
      steps:
        - name: generate_weekly_ops_review
          payload:
            days: 7
            retention_count: 10

        - name: notify_tg
          payload:
            format: message
            title: "[WEEKLY] ops review generated"
            facts:
              - key: path
                value: "{{ markdown_path }}"
            body: "Weekly review snapshot saved."
            source: "action-runner"
            event: "weekly_ops_review_generated"
            severity: "info"
            status: "firing"
    cooldown_seconds: 3600
