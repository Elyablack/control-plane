rules:
  - name: backup_missing_chain
    enabled: true
    match:
      alertname: BackupMissing
      status: firing
      severity: critical
    action:
      type: chain
      steps:
        - name: run_backup
          payload: {}
        - name: verify_backup
          payload: {}
        - name: notify_tg
          payload:
            message: "[{{ chain_status|upper }}] {{ alertname }} on {{ instance }}"
            description: |
              Backup workflow finished

              rule: {{ rule_name }}
              backup_run_id: {{ first_run_id }}
              steps_executed: {{ step_count }}/{{ total_steps }}
            source: "action-runner"
            event: "backup_chain_completed"
            severity: "info"
            status: "firing"
          retries: 3
          retry_delay_seconds: 2
    cooldown_seconds: 3600

  - name: mac_memory_pressure_warning_notify
    enabled: true
    match:
      alertname: MacMemoryPressure
      status: firing
      severity: warning
    action:
      type: chain
      steps:
        - name: notify_tg
          payload:
            format: message
            title: "[MAC][WARNING] {{ instance }} memory pressure"
            facts:
              - key: top_app
                value: "{{ top_app }}"
              - key: top_rss_mb
                value: "{{ top_rss_mb }}"
              - key: swap_used_mb
                value: "{{ swap_used_mb }}"
              - key: memory_free_percent
                value: "{{ memory_free_percent }}"
              - key: uptime_days
                value: "{{ uptime_days }}"
              - key: suggested_action
                value: "{{ suggested_action }}"
            body: "{{ reason_text }}"
            source: "action-runner"
            event: "mac_memory_pressure_warning"
            severity: "warning"
            status: "firing"
          retries: 3
          retry_delay_seconds: 2
    cooldown_seconds: 900

  - name: mac_memory_pressure_critical_escalate
    enabled: true
    match:
      alertname: MacMemoryPressure
      status: firing
      severity: critical
    action:
      type: chain
      steps:
        - name: notify_tg
          payload:
            format: message
            title: "[MAC][CRITICAL] {{ instance }} memory pressure"
            facts:
              - key: top_app
                value: "{{ top_app }}"
              - key: top_rss_mb
                value: "{{ top_rss_mb }}"
              - key: swap_used_mb
                value: "{{ swap_used_mb }}"
              - key: memory_free_percent
                value: "{{ memory_free_percent }}"
              - key: uptime_days
                value: "{{ uptime_days }}"
              - key: suggested_action
                value: "{{ suggested_action }}"
              - key: remediation
                value: "soft_quit_allowlisted_candidate"
            body: "{{ reason_text }}"
            source: "action-runner"
            event: "mac_memory_pressure_critical"
            severity: "critical"
            status: "firing"

        - name: enqueue_mac_action
          payload:
            action: "soft_quit_allowlisted_candidate"
            instance: "{{ instance }}"
            severity: "{{ severity }}"
    cooldown_seconds: 300

  - name: host_reboot_detected_ignore
    enabled: true
    match:
      alertname: HostRebootDetected
      status: firing
    action:
      type: ignore
    cooldown_seconds: 0

  - name: vps_host_audit_daily
    enabled: true
    match:
      alertname: VpsHostAuditDaily
      status: firing
      severity: info
    action:
      type: chain
      steps:
        - name: run_vps_host_audit
          payload:
            log_dir: /var/log/vps-host-audit
            timeout_seconds: 120

        - name: verify_vps_host_audit
          payload:
            log_dir: /var/log/vps-host-audit
            max_age_seconds: 1800

        - name: analyze_vps_host_audit
          payload:
            log_dir: /var/log/vps-host-audit
            metrics_path: /var/lib/node_exporter/textfile_collector/vps_host_audit.prom

        - name: generate_ai_ops_brief
          when:
            analysis_level_in: ["warning", "critical"]
          payload:
            source: vps_host_audit
            analysis_level: "{{ analysis_level }}"
            analysis_summary: "{{ analysis_summary }}"
            analysis_findings_count: "{{ analysis_findings_count }}"
            analysis_log_path: "{{ analysis_log_path }}"
            facts:
              host: vps
              metrics_path: "{{ metrics_path }}"

        - name: copy_file_to_mac
          when:
            analysis_level_in: ["warning", "critical"]
          payload:
            source_path: "{{ markdown_path }}"
            target_dir: "~/Documents/control-plane-reviews/briefs"

        - name: notify_tg
          when:
            analysis_level_in: ["warning", "critical"]
          payload:
            format: message
            title: "[VPS][{{ analysis_level|upper }}] audit brief"
            facts:
              - key: brief
                value: "{{ brief_status }}"
              - key: file
                value: "{{ markdown_path }}"
            body: "{{ analysis_summary }}"
            source: action-runner
            event: vps_host_audit_brief
            severity: "{{ analysis_level }}"
            status: firing
    cooldown_seconds: 3600

  - name: admin_host_audit_daily
    enabled: true
    match:
      alertname: AdminHostAuditDaily
      status: firing
      severity: info
    action:
      type: chain
      steps:
        - name: run_admin_host_audit
          payload:
            host: admin
            log_dir: /var/log/admin-host-audit

        - name: verify_admin_host_audit
          payload:
            log_dir: /var/log/admin-host-audit
            max_age_seconds: 1800

        - name: analyze_admin_host_audit
          payload:
            host: admin
            log_dir: /var/log/admin-host-audit

        - name: generate_ai_ops_brief
          when:
            analysis_level_in: ["warning", "critical"]
          payload:
            source: admin_host_audit
            analysis_level: "{{ analysis_level }}"
            analysis_summary: "{{ analysis_summary }}"
            analysis_findings_count: "{{ analysis_findings_count }}"
            analysis_log_path: "{{ analysis_log_path }}"
            facts:
              host: admin
              metrics_path: "{{ metrics_path }}"

        - name: copy_file_to_mac
          when:
            analysis_level_in: ["warning", "critical"]
          payload:
            source_path: "{{ markdown_path }}"
            target_dir: "~/Documents/control-plane-reviews/briefs"

        - name: notify_tg
          when:
            analysis_level_in: ["warning", "critical"]
          payload:
            format: message
            title: "[ADMIN][{{ analysis_level|upper }}] audit brief"
            facts:
              - key: brief
                value: "{{ brief_status }}"
              - key: file
                value: "{{ markdown_path }}"
            body: "{{ analysis_summary }}"
            source: action-runner
            event: admin_host_audit_brief
            severity: "{{ analysis_level }}"
            status: firing
    cooldown_seconds: 3600

  - name: weekly_ops_review_generate
    enabled: true
    match:
      alertname: WeeklyOpsReview
      status: firing
      severity: info
    action:
      type: chain
      steps:
        - name: generate_weekly_ops_review
          payload:
            days: 7
            retention_count: 10

        - name: copy_file_to_mac
          payload:
            source_path: "{{ markdown_path }}"
            target_dir: "~/Documents/control-plane-reviews/weekly"

        - name: notify_tg
          payload:
            format: message
            title: "[WEEKLY] ops review generated"
            facts:
              - key: file
                value: "{{ markdown_path }}"
            body: "Weekly review saved."
            source: action-runner
            event: weekly_ops_review_generated
            severity: info
            status: firing
    cooldown_seconds: 3600

  - name: monitoring_stack_audit_daily
    enabled: true
    match:
      alertname: MonitoringStackAuditDaily
      status: firing
      severity: info
    action:
      type: chain
      steps:
        - name: run_monitoring_stack_audit
          payload:
            log_dir: /var/log/monitoring-stack-audit
            timeout_seconds: 60
            http_timeout_seconds: 5
            prometheus_base_url: http://127.0.0.1:9090

        - name: verify_monitoring_stack_audit
          payload:
            log_dir: /var/log/monitoring-stack-audit
            max_age_seconds: 1800

        - name: analyze_monitoring_stack_audit
          payload:
            log_dir: /var/log/monitoring-stack-audit
            metrics_path: /var/lib/node_exporter/textfile_collector/monitoring_stack_audit.prom

        - name: generate_ai_ops_brief
          when:
            analysis_level_in: ["warning", "critical"]
          payload:
            source: monitoring_stack_audit
            analysis_level: "{{ analysis_level }}"
            analysis_summary: "{{ analysis_summary }}"
            analysis_findings_count: "{{ analysis_findings_count }}"
            analysis_log_path: "{{ analysis_log_path }}"
            facts:
              host: vps
              metrics_path: "{{ metrics_path }}"

        - name: copy_file_to_mac
          when:
            analysis_level_in: ["warning", "critical"]
          payload:
            source_path: "{{ markdown_path }}"
            target_dir: "~/Documents/control-plane-reviews/briefs"

        - name: notify_tg
          when:
            analysis_level_in: ["warning", "critical"]
          payload:
            format: message
            title: "[STACK][{{ analysis_level|upper }}] audit brief"
            facts:
              - key: brief
                value: "{{ brief_status }}"
              - key: file
                value: "{{ markdown_path }}"
            body: "{{ analysis_summary }}"
            source: action-runner
            event: monitoring_stack_audit_brief
            severity: "{{ analysis_level }}"
            status: firing
    cooldown_seconds: 3600

  - name: mac_host_audit_daily
    enabled: true
    match:
      alertname: MacHostAuditDaily
      status: firing
      severity: info
    action:
      type: chain
      steps:
        - name: verify_mac_host_audit
          payload:
            audit_dir: /srv/control-plane/state/mac-host-audit
            max_age_seconds: 1800

        - name: analyze_mac_host_audit
          payload:
            audit_dir: /srv/control-plane/state/mac-host-audit
            metrics_path: /var/lib/node_exporter/textfile_collector/mac_host_audit.prom

        - name: generate_ai_ops_brief
          when:
            analysis_level_in: ["warning", "critical"]
          payload:
            source: mac_host_audit
            analysis_level: "{{ analysis_level }}"
            analysis_summary: "{{ analysis_summary }}"
            analysis_findings_count: "{{ analysis_findings_count }}"
            analysis_log_path: "{{ analysis_log_path }}"
            facts:
              host: mba
              metrics_path: "{{ metrics_path }}"

        - name: copy_file_to_mac
          when:
            analysis_level_in: ["warning", "critical"]
          payload:
            source_path: "{{ markdown_path }}"
            target_dir: "~/Documents/control-plane-reviews/briefs"

        - name: notify_tg
          when:
            analysis_level_in: ["warning", "critical"]
          payload:
            format: message
            title: "[MAC][{{ analysis_level|upper }}] audit brief"
            facts:
              - key: brief
                value: "{{ brief_status }}"
              - key: file
                value: "{{ markdown_path }}"
            body: "{{ analysis_summary }}"
            source: action-runner
            event: mac_host_audit_brief
            severity: "{{ analysis_level }}"
            status: firing
    cooldown_seconds: 3600
