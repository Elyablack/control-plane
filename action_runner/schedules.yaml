schedules:
  - name: admin_host_audit_weekly
    enabled: true
    weekday: 6
    hour: 4
    minute: 0
    signal:
      alertname: AdminHostAuditWeekly
      status: firing
      severity: info
      instance: admin
      job: scheduler
      summary: scheduled weekly admin host audit
      description: internal scheduled trigger for admin host audit workflow

  - name: weekly_ops_review
    enabled: true
    weekday: 6
    hour: 4
    minute: 15
    signal:
      alertname: WeeklyOpsReview
      status: firing
      severity: info
      instance: vps
      job: scheduler
      summary: scheduled weekly ops review
      description: internal scheduled trigger for weekly ops review generation

  - name: vps_host_audit_daily
    enabled: true
    daily: true
    hour: 4
    minute: 30
    signal:
      alertname: VpsHostAuditDaily
      status: firing
      severity: info
      instance: vps
      job: scheduler
      summary: scheduled daily vps host audit
      description: internal scheduled trigger for vps host audit workflow
