- name: Backup VPS
  hosts: backup_source
  become: true

  vars:
    backup_dir: /srv/backups
    backup_name: "vps-backup-{{ ansible_date_time.date }}-{{ ansible_date_time.hour }}{{ ansible_date_time.minute }}.tar.gz"

  tasks:
    - name: Ensure backup directory exists
      file:
        path: "{{ backup_dir }}"
        state: directory
        mode: "0755"

    - name: Create backup archive
      archive:
        path:
          - /srv/monitoring
          - /etc
        dest: "{{ backup_dir }}/{{ backup_name }}"
        format: gz

    - name: Set backup file ownership
      file:
        path: "{{ backup_dir }}/{{ backup_name }}"
        owner: admin1
        group: admin1
        mode: "0644"

    - name: Remove old backups on VPS (keep 7)
      shell: |
        ls -t /srv/backups/vps-backup-*.tar.gz 2>/dev/null | tail -n +8 | xargs -r rm -f
        ls -t /srv/backups/vps-backup-*.tar.gz.sha256 2>/dev/null | tail -n +8 | xargs -r rm -f
      args:
        executable: /bin/bash
